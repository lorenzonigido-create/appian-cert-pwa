<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0b0f1a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="AppianCert"/>
<title>Appian Dev Cert</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0b0f1a;color:#e2e8f0;font-family:'DM Sans',sans-serif;overflow:hidden}
:root{
  --bg:#0b0f1a;--bg2:#111827;--bg3:#1a2235;--bg4:#0f172a;
  --border:#1f2d45;--accent:#f97316;--accent2:#fb923c;
  --blue:#3b82f6;--blue2:#60a5fa;--green:#22c55e;--green2:#4ade80;
  --red:#ef4444;--purple:#a855f7;--text:#e2e8f0;--text2:#94a3b8;--muted:#475569;
  --mono:'Space Mono',monospace;--syne:'Syne',sans-serif;--sans:'DM Sans',sans-serif;
}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;display:none;flex-direction:column;gap:14px;padding-bottom:90px}
.screen.active{display:flex}
.screen::-webkit-scrollbar{width:3px}
.screen::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.hdr{background:rgba(17,24,39,.97);border-bottom:1px solid var(--border);padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-logo{font-family:var(--mono);font-size:12px;letter-spacing:3px;color:var(--accent);font-weight:700}
.hdr-c{font-family:var(--syne);font-size:17px;font-weight:700}
.pill{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:20px;font-weight:700}
.pill-xp{background:rgba(249,115,22,.15);color:var(--accent);border:1px solid rgba(249,115,22,.3)}
.pill-s{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(17,24,39,.98);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 14px;z-index:100}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 14px;color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.5px;transition:color .2s}
.nb.on{color:var(--accent)}
.nb svg{width:22px;height:22px;stroke-width:1.8}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;transition:transform .15s,border-color .2s}
.ca{border-color:var(--accent)!important}
.cb{border-color:var(--blue)!important}
.cg{border-color:var(--green)!important}
.cp{border-color:var(--purple)!important}
.tap{cursor:pointer}.tap:active{transform:scale(.97)}
.btn{font-family:var(--mono);font-size:11px;letter-spacing:1px;border:none;border-radius:12px;padding:13px 20px;cursor:pointer;transition:all .2s;width:100%;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.bp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.bo{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.bs{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.bg{background:linear-gradient(135deg,var(--green),var(--green2));color:#000}
.bb{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff}
.bsm{padding:8px 14px;font-size:10px;width:auto}
.prog{background:var(--bg3);border-radius:99px;height:5px;overflow:hidden}
.prog-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s ease}
.tag{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;letter-spacing:.8px;padding:3px 8px;border-radius:6px;text-transform:uppercase;font-weight:700}
.to{background:rgba(249,115,22,.15);color:var(--accent)}
.tb{background:rgba(59,130,246,.15);color:var(--blue)}
.tg{background:rgba(34,197,94,.15);color:var(--green)}
.tm{background:var(--bg3);color:var(--muted)}
.tp{background:rgba(168,85,247,.15);color:var(--purple)}
.qopt{background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;cursor:pointer;margin-bottom:10px;font-size:13px;color:var(--text);transition:all .2s;text-align:left;width:100%;font-family:var(--sans);display:flex;align-items:center;gap:10px}
.qopt:hover{border-color:rgba(249,115,22,.4)}
.qopt.correct{border-color:var(--green)!important;background:rgba(34,197,94,.1)!important;color:var(--green)!important}
.qopt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.1)!important;color:var(--red)!important}
.qopt.sel{border-color:var(--blue);background:rgba(59,130,246,.1)}
.qopt[disabled]{cursor:default}
.qkey{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg4);padding:3px 7px;border-radius:4px;flex-shrink:0}
.qtext{font-size:14px;font-weight:600;margin-bottom:18px;line-height:1.5;color:var(--text)}
.alg{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5}
.alr{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5}
.alb{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--blue2);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5}
.alo{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);color:var(--accent2);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5}
.lb{font-size:14px;line-height:1.8;color:#94a3b8}
.lb h4{font-family:var(--syne);font-size:17px;color:var(--text);margin:16px 0 8px;font-weight:700}
.lb p{margin-bottom:10px}
.lb ul,.lb ol{padding-left:20px;margin-bottom:10px}
.lb li{margin-bottom:5px}
.lb code{font-family:var(--mono);font-size:11px;background:rgba(249,115,22,.1);padding:2px 6px;border-radius:4px;color:var(--accent);border:1px solid rgba(249,115,22,.2)}
.lb strong{color:var(--text);font-weight:600}
.lb .tip{background:rgba(59,130,246,.08);border-left:3px solid var(--blue);padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:13px;color:var(--blue2)}
.lb .warn{background:rgba(249,115,22,.08);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:13px;color:var(--accent2)}
.rm-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;border:2px solid var(--border);background:var(--bg3);flex-shrink:0}
.rm-dot.done{background:var(--green);border-color:var(--green);color:#000}
.rm-dot.active{background:var(--accent);border-color:var(--accent);color:#000;animation:pd 2s infinite}
@keyframes pd{0%,100%{box-shadow:0 0 8px rgba(249,115,22,.3)}50%{box-shadow:0 0 18px rgba(249,115,22,.7)}}
.rmd{width:2px;background:var(--border);margin:4px 0;flex:1}
.rmd.done{background:var(--green)}
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ach-item{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.ach-item.earned{border-color:var(--accent);background:rgba(249,115,22,.08)}
.ach-icon{font-size:26px;margin-bottom:5px;filter:grayscale(1) opacity(.3)}
.ach-item.earned .ach-icon{filter:none}
.ach-name{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:.5px}
.ach-item.earned .ach-name{color:var(--accent)}
.ai-b{background:var(--bg3);border:1px solid var(--border);border-radius:12px 12px 12px 4px;padding:12px 14px;font-size:13px;line-height:1.7;color:var(--text2);max-width:92%;white-space:pre-wrap}
.ai-u{background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.2);border-radius:12px 12px 4px 12px;color:var(--text);margin-left:auto;max-width:85%}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:tp .9s infinite;display:inline-block;margin:0 2px}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
.ai-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:22px;padding:10px 16px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;min-width:0}
.ai-inp:focus{border-color:rgba(249,115,22,.4)}
.ai-send{background:var(--accent);border:none;border-radius:22px;padding:10px 16px;color:#000;cursor:pointer;font-weight:700;flex-shrink:0;font-size:16px}
#tc{position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:398px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:tsi .3s ease}
.toast.hide{animation:tso .3s ease forwards}
@keyframes tsi{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes tso{to{opacity:0;transform:translateY(-14px)}}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end}
.mbg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:88vh;overflow-y:auto}
.mh{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sb{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.sn{font-family:var(--syne);font-size:28px;color:var(--accent);line-height:1;font-weight:800}
.sl{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.8px}
.divx{height:1px;background:var(--border);margin:14px 0}
.row{display:flex;align-items:center;gap:10px}
.row-bet{display:flex;align-items:center;justify-content:space-between}
.stit{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.h1{font-family:var(--syne);font-size:26px;font-weight:800;line-height:1.1}
.h2{font-family:var(--syne);font-size:20px;font-weight:700}
.h3{font-family:var(--syne);font-size:16px;font-weight:700}
.tc{text-align:center}
.cm{color:var(--muted)}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.timer{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--accent)}
.danger{color:var(--red)!important;animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.big-score{font-family:var(--syne);font-size:50px;font-weight:800;margin:14px 0}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span class="hdr-logo">&#9889;APPIAN</span>
    <span class="hdr-c" id="hdr-t">Dev Cert</span>
    <div class="row" style="gap:6px">
      <span class="pill pill-s" id="sp">&#128293;0</span>
      <span class="pill pill-xp" id="xp">0 XP</span>
    </div>
  </div>
  <div class="screen active" id="s-home"></div>
  <div class="screen" id="s-road"></div>
  <div class="screen" id="s-learn"></div>
  <div class="screen" id="s-ai"></div>
  <div class="screen" id="s-exam"></div>
  <nav class="nav">
    <button class="nb on" data-t="home" onclick="go('home')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>HOME
    </button>
    <button class="nb" data-t="road" onclick="go('road')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>ROAD
    </button>
    <button class="nb" data-t="learn" onclick="go('learn')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>LEARN
    </button>
    <button class="nb" data-t="ai" onclick="go('ai')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M8 12h.01M12 12h.01M16 12h.01"/></svg>AI
    </button>
    <button class="nb" data-t="exam" onclick="go('exam')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>ESAME
    </button>
  </nav>
</div>
<div id="tc"></div>
<div class="mbg" id="mbg" onclick="if(event.target===this)cM()">
  <div class="modal"><div class="mh"></div><div id="mb"></div></div>
</div>
<script>

const _D = {"CONTENT":{"1.1":"<h4>Definizione</h4><p>Appian è una piattaforma <strong>low-code enterprise</strong> che combina BPM, AI, RPA e Data Fabric. A differenza del no-code, il low-code permette espressioni e logica personalizzata.</p><h4>I 5 Pilastri</h4><ul><li><strong>Process Automation</strong>: workflow BPMN</li><li><strong>Data Fabric</strong>: connessione dati senza replicazione</li><li><strong>AI/ML</strong>: Document Extraction, Classification, GenAI</li><li><strong>RPA</strong>: robot per sistemi legacy (da Jidoka)</li><li><strong>Process Mining</strong>: analisi log reali</li></ul><h4>Cloud</h4><ul><li>Appian Cloud su <strong>Amazon AWS</strong></li><li>SLA: <strong>99.9%</strong> uptime</li><li>Deployment: Cloud, On-Premise, Ibrido</li><li>Certificazioni: SOC 2, FedRAMP, ISO 27001</li></ul><div class='tip'>Appian = Low-Code, NON No-Code. Permette Expression Language e logica personalizzata.</div>","1.2":"<h4>Appian Designer</h4><p>IDE completamente <strong>web-based</strong>. Nessuna installazione. Sezioni principali:</p><ul><li><strong>Build</strong>: crea e modifica oggetti</li><li><strong>Monitor</strong>: processi in esecuzione e debug</li><li><strong>Deploy</strong>: Package e Compare and Deploy</li><li><strong>Governance</strong>: utenti, gruppi, permessi</li></ul><h4>Oggetti Principali</h4><ul><li><code>Process Model</code>: workflow BPMN</li><li><code>Interface</code>: UI SAIL</li><li><code>Record Type</code>: entità dati</li><li><code>Expression Rule</code>: funzione riutilizzabile</li><li><code>Integration</code>: connessione sistemi esterni</li><li><code>Decision</code>: tabella decisionale DMN</li><li><code>Constant</code>: valore fisso per ambiente</li><li><code>CDT</code>: tipo dato strutturato</li></ul><h4>Prefissi</h4><ul><li><code>pv!</code> processo, <code>ac!</code> task corrente, <code>local!</code> UI, <code>ri!</code> input esterno, <code>cons!</code> constant, <code>rule!</code> chiama rule, <code>a!</code> funzione SAIL</li></ul><div class='warn'>Le Constant sono l'unico oggetto con valori diversi per ambiente senza modificare il codice.</div>","1.3":"<h4>SDLC e Ambienti</h4><ul><li><strong>DEV</strong>: sviluppo e unit test</li><li><strong>TEST/QA</strong>: UAT con utenti business</li><li><strong>PROD</strong>: sistema live, modifiche solo via deploy</li></ul><h4>Package di Deploy</h4><p>Meccanismo di trasporto oggetti tra ambienti. Flusso sempre: <code>DEV → TEST → PROD</code>. Contiene oggetti selezionati con dipendenze.</p><h4>Compare and Deploy</h4><p>Mostra differenze tra ambienti prima del deploy: oggetti modificati, mancanti, in conflitto.</p><h4>Best Practices</h4><ul><li>Prefissi consistenti (es. <code>HR_NomeOggetto</code>)</li><li>Mai modificare direttamente in PROD</li><li>Constant per config diversa per ambiente</li><li>Includere sempre le dipendenze nel package</li></ul><div class='tip'>Deploy SEMPRE DEV→TEST→PROD. Qualsiasi ordine diverso nelle opzioni d'esame è sbagliato.</div>","2.1":"<h4>Nodi del Process Model</h4><ul><li><strong>Start/End Event</strong>: avvio e chiusura processo</li><li><strong>User Input Task</strong>: form SAIL assegnato a utente/gruppo. Processo si blocca in attesa.</li><li><strong>Script Task</strong>: Expression Rule in background, senza utente, non blocca</li><li><strong>Service Task</strong>: chiama Integration o Smart Service</li><li><strong>Gateway XOR</strong>: UN solo ramo. Richiede default flow.</li><li><strong>Gateway AND</strong>: TUTTI i rami in parallelo. Join AND attende tutti.</li><li><strong>Gateway OR</strong>: uno o più rami per condizione</li><li><strong>Sub-Process</strong>: processo figlio annidato</li></ul><h4>Process Variables (pv!)</h4><ul><li>Persistono per tutta l'esecuzione</li><li>Tipi: Text, Integer, Boolean, Date, CDT, List</li><li>Configurabili come input/output del processo</li></ul><h4>Stati Processo</h4><ul><li><code>ACTIVE</code>, <code>COMPLETED</code>, <code>CANCELLED</code> (errore), <code>PAUSED</code>, <code>ARCHIVED</code></li></ul><div class='tip'>pv! = processo (persiste) — ac! = task corrente — local! = UI temporanea — ri! = input esterno</div>","2.2":"<h4>Gateway in Dettaglio</h4><ul><li><strong>XOR</strong>: valuta condizioni IN ORDINE, percorre il primo vero. SEMPRE definire default flow o il processo va in PAUSED.</li><li><strong>AND</strong>: attiva tutti i rami, Join AND attende tutti prima di proseguire.</li><li><strong>OR</strong>: uno o più rami attivi, Join OR attende solo quelli attivati.</li></ul><h4>Smart Services Principali</h4><ul><li><code>Send Email</code>: invia email con template</li><li><code>Write to Data Store Entity</code>: salva CDT nel DB</li><li><code>Delete from Data Store Entity</code>: cancella dal DB</li><li><code>Start Process</code>: avvia processo figlio</li><li><code>Create Task</code>: task ad-hoc</li><li><code>Set Process Variable</code>: aggiorna pv!</li><li><code>Reassign Task</code>: riassegna task</li></ul><div class='warn'>Write to Data Store Entity richiede permesso Editor sul Data Store E Initiator sul Process Model. Entrambi necessari.</div><h4>Condizioni Archi</h4><ul><li>In Appian Expression Language: <code>pv!stato = \"APPROVATO\"</code></li><li>Logica: <code>pv!importo > 1000 and pv!urgente</code></li></ul>","2.3":"<h4>Boundary Events</h4><ul><li><strong>Timer Boundary</strong>: scatta dopo un tempo. Per reminder, escalation, SLA.</li><li><strong>Error Boundary</strong>: cattura errori del task. Permette percorso alternativo.</li><li><strong>Signal Boundary</strong>: risponde a segnale esterno via API.</li><li><strong>Message Boundary</strong>: risponde a messaggi da altri processi.</li></ul><h4>Interrupting vs Non-Interrupting</h4><ul><li><strong>Interrupting (bordo pieno)</strong>: termina il task quando scatta</li><li><strong>Non-Interrupting (bordo tratteggiato)</strong>: task rimane attivo, avvia percorso parallelo</li></ul><div class='tip'>Pattern escalation: Timer NON-Interrupting a 24h = reminder (task aperto). Timer Interrupting a 48h = escalation al manager (task chiuso).</div><h4>Gestione Errori</h4><ul><li>Errore non gestito = processo in CANCELLED</li><li>Error Boundary sul Service Task = cattura errore API</li><li>Exception Handler = gestisce errori non catchati</li></ul><h4>Retry Pattern</h4><p>Error Boundary → Gateway XOR → se tentativi < 3 → torna al Service Task (incrementa pv!tentativi)</p>","3.1":"<h4>SAIL — Self-Assembling Interface Layer</h4><p>Framework UI di Appian in Expression Language. Automaticamente responsive su desktop, tablet, mobile.</p><h4>Variabili</h4><ul><li><code>local!</code>: stato UI temporaneo. Aggiornata con <code>a!save(target: local!var, value: val)</code></li><li><code>ri!</code>: Rule Input. Parametri dall'esterno. Read-only nell'interface.</li></ul><h4>Layout</h4><ul><li><code>a!formLayout()</code>: layout principale form (titolo, contenuto, pulsanti)</li><li><code>a!sideBySideLayout()</code>: affianca orizzontalmente. <strong>Raccomandato per top-level.</strong></li><li><code>a!sectionLayout()</code>: sezioni collassabili. Per form lunghi.</li><li><code>a!columnLayout()</code>: colonne con peso configurabile</li><li><code>a!boxLayout()</code>: contenitore con bordo</li><li><code>a!cardLayout()</code>: card cliccabile elevata</li><li><code>a!stampLayout()</code>: icona + testo. Per KPI.</li></ul><h4>Componenti Input</h4><ul><li><code>a!textField()</code>, <code>a!paragraphField()</code>, <code>a!integerField()</code></li><li><code>a!dropdownField()</code>, <code>a!checkboxField()</code>, <code>a!radioButtonField()</code></li><li><code>a!fileUploadField()</code>, <code>a!dateField()</code>, <code>a!dateTimeField()</code></li></ul><div class='tip'>Tutti i componenti input hanno il parametro <code>saveInto</code>: specifica dove salvare il valore.</div>","3.2":"<h4>Validazione — 3 Livelli</h4><ul><li><strong>Inline</strong>: parametro <code>validations</code> sul componente. Stringa vuota = nessun errore.</li><li><strong>Form-level</strong>: parametro <code>validations</code> su a!formLayout(). Errori globali in cima.</li><li><strong>Server-side</strong>: Expression Rule all'invio. Se restituisce stringa non vuota, form non inviato.</li></ul><h4>showWhen</h4><ul><li><code>showWhen: false</code> = componente <strong>rimosso dal DOM</strong>, non solo nascosto</li><li>I campi con showWhen:false NON vengono inviati al submit</li><li>Un campo obbligatorio con showWhen:false non blocca il submit</li></ul><div class='warn'>showWhen:false rimuove dal DOM. Diverso da display:none in CSS.</div><h4>a!refreshVariable()</h4><ul><li><code>refreshOnVarChange</code>: ricalcola quando la variabile cambia</li><li><code>refreshInterval</code>: polling ogni N secondi</li><li><code>refreshOnReferencedVarChange</code>: monitora tutte le var referenziate</li></ul><h4>a!isPageWidth()</h4><ul><li><code>NARROW</code> = mobile, <code>MEDIUM</code> = tablet, <code>WIDE</code> = desktop</li></ul>","3.3":"<h4>a!gridField()</h4><p>Griglia tabellare con: paginazione (a!pagingInfo), ordinamento colonne, selezione righe, editing inline, export CSV.</p><ul><li><strong>Read-only grid</strong>: solo visualizzazione</li><li><strong>Editable grid</strong>: celle modificabili inline</li></ul><h4>Links</h4><ul><li><code>a!recordLink()</code>: apre Summary View del Record Type</li><li><code>a!dynamicLink()</code>: azione custom al click (modal, aggiorna variabile)</li><li><code>a!urlLink()</code>: link esterno in nuova tab</li><li><code>a!startProcessLink()</code>: avvia processo Appian</li></ul><h4>Best Practices UI</h4><div class='warn'>Frequenti all'esame ACD100:</div><ul><li><strong>Colori</strong>: palette piccola e coerente (small, consistent color palette). Max 3-4 colori.</li><li><strong>Label</strong>: sempre sopra i campi</li><li><strong>Pulsanti</strong>: solo il principale come primary (colorato)</li><li><strong>Layout</strong>: a!sideBySideLayout() per top-level</li><li><strong>Responsive</strong>: testare con preview in Interface Designer</li></ul>","4.1":"<h4>Record Type</h4><p>Astrazione dati centrale di Appian. Rappresenta un'entità aziendale con dati, UI, relazioni, azioni e sicurezza.</p><h4>Sorgenti Dati</h4><ul><li><strong>Database Table</strong>: MySQL, Oracle, SQL Server, PostgreSQL. Supporta lettura e scrittura.</li><li><strong>Process Model</strong>: istanze processo. Le <strong>archiviate NON sono incluse.</strong></li><li><strong>Web Service</strong>: API esterne. Sola lettura dalla list/summary.</li><li><strong>Salesforce</strong>: tramite Salesforce Connected System nativo.</li></ul><div class='warn'>Process-backed records NON includono istanze archiviate. Domanda ricorrente ACD100.</div><h4>Auto-Generate</h4><ul><li><strong>List View</strong>: tabella con filtri e ordinamento</li><li><strong>Summary View</strong>: dettaglio singolo record</li><li><strong>User Filters</strong>: filtri applicabili dall'utente (Static o Expression-based)</li><li><strong>Related Actions</strong>: azioni contestuali collegate a processi</li><li><strong>Record Security</strong>: permessi di accesso</li></ul>","4.2":"<h4>CDT — Custom Data Type</h4><p>Tipo dato strutturato. Mappa tabella DB o oggetto JSON in un tipo Appian. Creato da Designer o auto-generato da DB table.</p><h4>Expression Rules</h4><ul><li>Accettano input via <code>ri!</code></li><li>Restituiscono un valore</li><li>Si chiamano con <code>rule!nomeRule(param: val)</code></li><li>Riutilizzabili da processi, interface, altre rules</li></ul><h4>a!queryRecordType()</h4><ul><li><code>recordType</code>: es. <code>recordType!Customer</code></li><li><code>filters</code>: a!queryFilter() o a!queryLogicalExpression()</li><li><code>pagingInfo</code>: a!pagingInfo(startIndex, batchSize, sort)</li><li><code>fields</code>: campi da restituire</li></ul><h4>a!queryFilter() — Operatori</h4><ul><li>=, != (uguaglianza)</li><li>IN, NOT_IN (appartenenza a lista)</li><li>BETWEEN (range)</li><li>IS_NULL, NOT_NULL</li><li>CONTAINS (substring)</li><li>STARTS_WITH</li></ul><h4>a!queryAggregation()</h4><p>Aggregazioni lato server: COUNT, SUM, AVG, MAX, MIN con grouping. Ottimizzata per grandi volumi.</p>","4.3":"<h4>Relazioni tra Record Types</h4><ul><li><strong>One-to-Many</strong>: es. Cliente → Ordini. FK nel record <strong>FIGLIO</strong>.</li><li><strong>Many-to-One</strong>: la relazione One-to-Many dal lato figlio.</li><li><strong>Many-to-Many</strong>: tabella di giunzione, due relazioni One-to-Many.</li></ul><p>Accesso: <code>recordType!Customer.relationships.orders</code>. JOIN generati automaticamente.</p><h4>User Filters</h4><ul><li><strong>Static</strong>: valori fissi predefiniti</li><li><strong>Expression-based</strong>: logica dinamica, può usare Constant, loggedInUser(), date calcolate</li></ul><h4>Record-Level Security</h4><ul><li><code>a!recordFilterList()</code>: filtri automatici per utente corrente</li><li><code>loggedInUser()</code>: username utente loggato</li><li><code>a!isUserInGroup()</code>: verifica membership gruppo</li></ul><div class='warn'>Per accesso via URL diretto servono: (1) Source security, (2) Record Type security, (3) Default filters. Tutti e tre.</div><div class='tip'>Record-level security applicata DOPO la source security. Entrambe vanno configurate.</div>","5.1":"<h4>Connected System</h4><p>Centralizza configurazione connessione: URL base, credenziali. Riutilizzabile da più Integration objects.</p><h4>Tipi di Integration</h4><ul><li><strong>REST</strong>: GET, POST, PUT, PATCH, DELETE</li><li><strong>SOAP</strong>: web service con WSDL</li><li><strong>OpenAPI</strong>: importa spec Swagger, genera operazioni automaticamente</li><li><strong>Database</strong>: SQL diretto SELECT/INSERT/UPDATE/DELETE</li></ul><h4>Autenticazione</h4><ul><li>No credentials, Basic Auth, API Key, OAuth 2.0 Auth Code, OAuth 2.0 Client Credentials, Client Certificate (mTLS)</li></ul><div class='warn'>Credenziali MAI hardcoded nel codice. Sempre nel Connected System.</div><h4>Integration REST</h4><ul><li>Metodi HTTP: GET, POST, PUT, PATCH, DELETE</li><li>Path relativo aggiunto a URL base del Connected System</li><li>Headers, Query Parameters, Body JSON</li><li>ri! per parametrizzare la chiamata</li></ul>","5.2":"<h4>Response Mapping</h4><ul><li><code>result.success</code>: true = HTTP 2xx, false = errore</li><li><code>result.statusCode</code>: codice HTTP</li><li><code>result.body</code>: risposta come CDT Appian</li><li><code>result.error</code>: messaggio errore</li></ul><p>Accesso: <code>rule!miaIntegration(param: val).body.campo</code></p><h4>Error Handling</h4><ul><li>Verificare SEMPRE result.success prima di usare i dati</li><li>Error Boundary sul Service Task per fallimenti API</li><li>Retry logic: loop con Gateway XOR + counter pv!tentativi</li></ul><div class='tip'>Integration invocabili da: Expression Rule (interface) con rule!nome() oppure da Service Task (processo).</div><h4>Database Integration</h4><ul><li>SELECT → risultati mappati su CDT automaticamente</li><li>Parametri via ri! per prevenire SQL injection</li><li>Timeout default: 30 secondi</li></ul>","6.1":"<h4>Sicurezza Group-Based</h4><p>Permessi assegnati ai <strong>gruppi</strong>, non agli utenti. Gli utenti ereditano permessi dai gruppi di appartenenza.</p><h4>5 Livelli di Permesso</h4><ul><li><strong>Administrator</strong>: accesso totale</li><li><strong>Editor</strong>: visualizza e modifica</li><li><strong>Initiator</strong>: SOLO avvia process models</li><li><strong>Viewer</strong>: sola lettura</li><li><strong>Deny</strong>: accesso negato esplicito. <strong>Priorità MASSIMA</strong>, sovrascrive tutto.</li></ul><div class='tip'>Priorità: Deny sopra tutto, poi Administrator, Editor, Initiator, Viewer.</div><h4>Nested Groups</h4><ul><li>Gruppi gerarchici: figlio eredita AUTOMATICAMENTE permessi del padre</li><li>Es. APP_Senior_Manager (figlio) eredita permessi di APP_Manager (padre)</li></ul><h4>Best Practices</h4><ul><li>Creare gruppi per ruolo: APP_Admins, APP_Editors, APP_Viewers</li><li>Assegnare permessi ai <strong>Folder</strong> dell'app, NON ai singoli oggetti</li><li>MAI assegnare permessi direttamente agli utenti</li></ul>","6.2":"<h4>Record Type Security — 3 Livelli</h4><ol><li><strong>Record Type Level</strong>: chi vede la lista (List View)</li><li><strong>Record Level</strong>: chi vede il singolo record via a!recordFilterList()</li><li><strong>Action Security</strong>: chi esegue le Related Actions</li></ol><h4>a!recordFilterList()</h4><ul><li>Filtri automatici per utente corrente</li><li>Esempio: <code>field: owner, operator: =, value: loggedInUser()</code></li><li>Manager vede tutti, altri solo i propri: usa a!isUserInGroup() nella condizione</li></ul><div class='warn'>Record-level security applicata DOPO source security. Per deep link URL: source + record type + default filters.</div><h4>Sicurezza Integration</h4><ul><li>Credenziali nel Connected System, MAI hardcoded</li><li>Token OAuth gestiti da Appian automaticamente</li><li>SSL/TLS obbligatorio per API esterne</li></ul><h4>SDLC Security</h4><ul><li>Sviluppatori: accesso DEV e TEST, NON PROD</li><li>Log audit per azioni su oggetti critici</li></ul>","7.1":"<h4>Appian Sites</h4><p>Portale web multi-pagina configurabile. Tipi di pagine:</p><ul><li><strong>Record List</strong>: lista Record Type con filtri</li><li><strong>Interface</strong>: qualsiasi Interface SAIL custom</li><li><strong>Report</strong>: dashboard con grafici KPI</li><li><strong>Action</strong>: avvio diretto processo nel Site</li></ul><h4>Navigazione</h4><ul><li>Menu configurabile, visibilità pagine per gruppo tramite showWhen</li><li>URL personalizzabile per ogni pagina</li><li>Branding: logo, colori, favicon</li></ul><h4>Tempo</h4><p>Interfaccia standard Appian: News Feed, Task List, Actions, Records. NON customizzata come i Sites.</p><div class='tip'>Sites = portale custom. Tempo = interfaccia standard. L'esame distingue i due.</div><h4>Portals</h4><ul><li>Siti accessibili <strong>pubblicamente senza login Appian</strong></li><li>Per: form pubblici, richieste clienti esterni, survey</li><li>Richiedono Portals Connected System separato</li><li>NON accedono ai dati interni Appian</li></ul>","7.2":"<h4>Componenti Chart</h4><ul><li><code>a!barChartField()</code>: barre orizzontali</li><li><code>a!columnChartField()</code>: colonne verticali</li><li><code>a!lineChartField()</code>: linee (trend temporali)</li><li><code>a!areaChartField()</code>: area sotto la linea</li><li><code>a!pieChartField()</code>: torta (proporzioni)</li><li><code>a!gaugeField()</code>: gauge circolare KPI con target</li><li><code>a!scatterChartField()</code>: scatter plot (correlazioni)</li></ul><h4>Dati per i Chart</h4><ul><li><code>a!queryRecordType()</code>: dati dal Record Type</li><li><code>a!queryAggregation()</code>: COUNT, SUM, AVG, MAX, MIN con grouping. Calcola lato DB. Per grandi volumi.</li></ul><div class='tip'>a!queryAggregation() è la scelta corretta per grafici su grandi volumi. Calcola lato database, non carica tutto in memoria.</div><h4>KPI Dashboard</h4><ul><li>a!stampLayout() per metriche semplici</li><li>a!gaugeField() per target percentuale</li><li>a!refreshVariable(refreshInterval: 300) per aggiornamento automatico ogni 5 min</li></ul>","8.1":"<h4>Appian AI Skills</h4><p>Capacità AI pre-costruite integrabili senza data science.</p><h4>Document Extraction</h4><ul><li>Estrae dati strutturati da PDF, JPEG, PNG, Word</li><li>Tecnologie: OCR + Machine Learning</li><li>Funzione: <code>a!extractDocumentData()</code></li><li>Output: CDT con campi estratti e livello confidenza</li><li>Use cases: fatture, contratti, moduli cartacei</li></ul><h4>Classification</h4><ul><li>Categorizza documenti in categorie predefinite</li><li>Output: categoria + confidenza percentuale</li><li>Use cases: smistamento email, routing pratiche</li></ul><h4>Generative AI</h4><ul><li>LLM via Connected System AI (OpenAI, Azure OpenAI, Google Vertex)</li><li>Use cases: riassunti, bozze email, traduzione, Q&A</li></ul><h4>Pattern Human-in-the-Loop</h4><div class='tip'>Service Task (Document Extraction) → User Input Task (Human Review) → Gateway XOR (confidenza alta = auto-approvazione, bassa = revisione manuale) → salva dati.</div>","8.2":"<h4>Appian RPA (da Jidoka)</h4><p>Automatizza operazioni su sistemi legacy senza API: click, form, copia-incolla, navigazione web, Excel, SAP.</p><h4>Attended vs Unattended</h4><ul><li><strong>Attended</strong>: robot con utente presente al PC</li><li><strong>Unattended</strong>: robot autonomo su server, senza utente, 24/7</li></ul><h4>Integrazione nei Processi</h4><ul><li>Nodo <strong>Robotic Task</strong> invoca il robot</li><li>Il processo passa dati al robot come input</li><li>Il robot restituisce risultati come output nelle pv!</li><li>Error Boundary gestisce fallimenti robot</li></ul><h4>Control Room</h4><ul><li>Inventario robot (stato: online/offline/in uso)</li><li>Scheduling esecuzioni</li><li>Monitoraggio e log dettagliati</li><li>Gestione errori e alerting</li></ul><h4>Process Mining</h4><ul><li>Analisi log reali: colli di bottiglia, deviazioni, KPI di processo</li></ul><h4>Data Fabric</h4><ul><li>Connette sorgenti eterogenee <strong>senza replicare i dati</strong></li><li>Record Types = punto di accesso unificato</li></ul><div class='tip'>Data Fabric = federazione dati in tempo reale. Record Types accedono a DB, API, Salesforce come se fossero una sorgente unica.</div>"},"CHAPTERS":[{"id":1,"emoji":"🏗️","title":"Piattaforma Appian","tag":"Fondamenti","xp":120,"docs":"https://docs.appian.com/suite/help/26.4/introduction-to-application-building.html","summary":"Appian è piattaforma low-code enterprise con BPM, AI, RPA, Data Fabric. Sviluppo via browser (Appian Designer). Oggetti nelle Applications, distribuiti tramite Package DEV→TEST→PROD. Cloud su AWS, SLA 99.9%. Esame ACD100: 60 domande, 60 min, soglia 62%.","map":{"c":"APPIAN PLATFORM","n":["Low-Code BPM","Process Mining","AI Skills","RPA Jidoka","Data Fabric","Appi // HTML HELPER - safe element creation
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==='cls')e.className=attrs[k];
    else if(k==='html')e.innerHTML=attrs[k];
    else if(k==='text')e.textContent=attrs[k];
    else if(k.startsWith('on'))e.addEventListener(k.slice(2),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(children)children.forEach(function(c){if(c)e.appendChild(c);});
  return e;
}
function div(cls,html){const d=document.createElement('div');d.className=cls||'';if(html)d.innerHTML=html;return d;}

    else if(s.sel===i)cls+=' sel';
    const dis=s.ok?' disabled':'';
    optsHTML+='<button class="'+cls+'"'+dis+' onclick="qPick(\''+cid+'\','+i+')">'+'<span class="qkey">'+K[i]+'</span>'+o+'</button>';
  });
  el.innerHTML='<div class="fade">'
    +'<div class="row-bet mb12"><span class="tag to">'+s.title+'</span>'
    +'<span style="font-family:var(--mono);font-size:11px;color:var(--muted)">'+(s.idx+1)+'/'+s.qs.length+'</span></div>'
    +'<div class="prog mb16"><div class="prog-f" style="width:'+pct+'%"></div></div>'
    +'<p class="qtext">'+q.q+'</p>'
    +optsHTML
    +'<div id="'+cid+'_fb"></div></div>';
}
function qPick(cid,i){
  const s=QS[cid];
  if(!s||s.ok)return;
  s.sel=i;s.ok=true;
  if(i===s.qs[s.idx].ans)s.score++;
  renderQ(cid);
  const fb=document.getElementById(cid+'_fb');
  if(fb){
    const ok=i===s.qs[s.idx].ans;
    fb.innerHTML='<div class="'+(ok?'alg':'alr')+' mt8 mb8">'
      +(ok?'✅ Corretto!':'❌ Risposta: <strong>'+s.qs[s.idx].opts[s.qs[s.idx].ans]+'</strong>')+'</div>'
      +'<button class="btn bp" onclick="qNext(\''+cid+'\')">'
      +(s.idx<s.qs.length-1?'AVANTI →':'FINE QUIZ ✓')+'</button>';
  }
}
function qNext(cid){
  const s=QS[cid];
  if(!s)return;
  if(s.idx<s.qs.length-1){s.idx++;s.sel=null;s.ok=false;renderQ(cid);}
  else{
    s.done=true;
    if(s.score===s.qs.length)S.pq++;
    saveS();chkACH();renderQResult(cid);
    if(s.onDone)s.onDone(s.score,s.qs.length);
  }
}
function renderQResult(cid){
  const s=QS[cid];
  const el=document.getElementById(cid);
  if(!el||!s)return;
  const pct=Math.round(s.score/s.qs.length*100);
  const pass=pct>=67;
  el.innerHTML='<div class="fade tc">'
    +'<div style="font-size:50px;margin-bottom:10px">'+(pass?'🎉':'💪')+'</div>'
    +'<div class="h2 mb8">'+(pass?'Ottimo!':'Riprova!')+'</div>'
    +'<div class="big-score" style="color:'+(pass?'var(--green)':'var(--red)')+'">'+pct+'%</div>'
    +'<div class="cm f13 mb16">'+s.score+'/'+s.qs.length+' corrette · soglia 67%</div>'
    +'<div class="'+(pass?'alg':'alr')+' mb16">'
    +(pass?'✅ Superato!':'❌ Rileggi il contenuto e riprova.')+'</div>'
    +'<button class="btn bs" onclick="startQuiz(QS[\''+cid+'\'].qs,\''+cid+'\',QS[\''+cid+'\'].onDone,QS[\''+cid+'\'].title)">🔄 RIPROVA</button></div>';
}

function dlFile(content,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'text/plain;charset=utf-8'}));
  a.download=name;document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},1000);
}

function kbTextOf(ids){
  return ids.map(function(id){return (CONTENT[id]||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();}).join(' ');
}

function localAIReply(question){
  const q=question.toLowerCase();
  let best=null,bestScore=0;
  KB_IDX.forEach(function(t){
    let score=0;
    t.keys.forEach(function(k){if(q.includes(k.toLowerCase()))score+=k.length;});
    if(score>bestScore){bestScore=score;best=t;}
  });
  if(!best||bestScore<2){
    return '💡 Non ho trovato una corrispondenza specifica. Prova a chiedere di:\n\n• **Variabili**: pv! vs local! vs ri!\n• **Gateway**: XOR, AND, OR, Boundary Events\n• **SAIL**: layout, showWhen, a!refreshVariable()\n• **Record Types**: CDT, query, relazioni, security\n• **Integrations**: Connected System, REST/SOAP/OpenAPI\n• **Security**: gruppi, permessi, Deny, nested groups\n• **Sites/Portals**: Tempo vs Sites, chart, a!gaugeField()\n• **AI/RPA**: Document Extraction, Classification, Jidoka\n• **Deploy**: SDLC, package, Compare and Deploy';
  }
  const text=kbTextOf(best.ids);
  const snippet=text.length>600?text.substring(0,600)+'...':text;
  const chNums=[...new Set(best.ids.map(function(id){return parseInt(id.split('.')[0]);}))];
  const chLabels=chNums.map(function(n){const c=CH.find(function(x){return x.id===n;});return c?c.emoji+' '+c.title:'';}).filter(Boolean).join(' · ');
  return '📚 **'+chLabels+'**\n\n'+snippet+'\n\n💡 Approfondisci in: Lezioni '+best.ids.join(', ')+' → scheda LEARN';
}

async function sAI(){
  const inp=document.getElementById('ai-inp');
  if(!inp)return;
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  aiMs.push({role:'user',content:msg});renderAIC();
  const el=document.getElementById('aic');
  if(!el)return;
  const tid='t'+Date.now();
  const td=document.createElement('div');
  td.id=tid;td.style.cssText='display:flex;gap:8px;align-items:flex-start';
  td.innerHTML='<div style="font-size:18px">🤖</div><div class="ai-b"><span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span></div>';
  el.appendChild(td);el.scrollTop=el.scrollHeight;

  if(!AI_KEY){
    // Modalità Knowledge Base locale — istantanea, offline
    setTimeout(function(){
      document.getElementById(tid)&&document.getElementById(tid).remove();
      aiMs.push({role:'assistant',content:localAIReply(msg)});
      renderAIC();
    },600);
    return;
  }

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':AI_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:600,
        system:'Sei un esperto tutor per la certificazione Appian ACD100. Rispondi SEMPRE in italiano, conciso (max 200 parole). Usa esempi pratici: pv!, ri!, local!, a!formLayout(), a!gridField() ecc. Focalizzati sul syllabus ACD100. Usa bullet point. Metti in grassetto (**testo**) i termini tecnici chiave.',
        messages:aiMs.slice(-10)
      })
    });
    const data=await res.json();
    document.getElementById(tid)&&document.getElementById(tid).remove();
    if(data.error){
      aiMs.push({role:'assistant',content:'⚠️ Errore API: '+data.error.message+'\n\nPassa alla Knowledge Base locale → tocca "✓ AI LIVE" per rimuovere la chiave.'});
    } else {
      const reply=(data.content&&data.content.find(function(b){return b.type==='text';})||{text:'Errore risposta.'});
      aiMs.push({role:'assistant',content:reply.text});
    }
  }catch(e){
    document.getElementById(tid)&&document.getElementById(tid).remove();
    const fallback=localAIReply(msg);
    aiMs.push({role:'assistant',content:'⚠️ API non raggiungibile. Risposta dalla KB locale:\n\n'+fallback});
  }
  renderAIC();
}

      +'<div class="f14" style="font-weight:600;line-height:1.5;margin-bottom:12px;color:var(--text)">'+card.q+'</div>'
      +optsHTML
      +'<div class="alg mt8 f12">✓ Risposta corretta: <strong>'+card.opts[card.ans]+'</strong></div>'
      +'</div>'
      +'<div class="row" style="gap:8px;margin-top:12px">'
      +(FC.idx>0?'<button class="btn bs" style="flex:1" onclick="FC.idx--;FC.flipped=false;renderFlash()">← Prec</button>':'')
      +(FC.idx<FC.cards.length-1
        ?'<button class="btn bp" style="flex:1" onclick="FC.idx++;FC.flipped=false;renderFlash()">Prossima →</button>'
        :'<button class="btn bg" style="flex:1" onclick="toast(\'🎉\',\'Flashcard completate! Vai al Test Capitolo.\',\'var(--green)\');oCh(FC.chId)">✓ FINE! Vai al Test</button>')
      +'</div></div>';
  }
}
